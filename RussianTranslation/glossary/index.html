<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sanskrit → Russian glossary (root · lemma · form)</title>
<style>
  :root{--bg:#faf8f4;--fg:#222;--mut:#777;--line:#e5ded2;--acc:#8a5a2b;--chip:#f0eadd;--card:#fff}
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.5 -apple-system,Segoe UI,Roboto,"Noto Sans",sans-serif;background:var(--bg);color:var(--fg)}
  header{padding:18px 20px 8px;border-bottom:1px solid var(--line)}
  h1{margin:0 0 4px;font-size:1.35rem}
  .sub{color:var(--mut);font-size:.9rem}
  .sub a{color:var(--acc)}
  .bar{position:sticky;top:0;background:var(--bg);padding:12px 20px;border-bottom:1px solid var(--line);z-index:5;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .tab{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:.9rem}
  .tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
  #q{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:1rem}
  .mode{font-size:.85rem;color:var(--mut);display:flex;gap:6px;align-items:center}
  .count{font-size:.85rem;color:var(--mut);margin-left:auto}
  main{padding:14px 20px 60px;max-width:1100px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0}
  .key{font-size:1.15rem;font-weight:600}
  .iast{color:var(--acc);font-style:italic;margin-left:6px}
  .meta{color:var(--mut);font-size:.82rem;margin-left:8px}
  .tr{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);border:1px solid var(--line);border-radius:14px;padding:2px 10px;font-size:.92rem;white-space:nowrap}
  .chip b{color:var(--mut);font-weight:400;font-size:.8em;margin-left:4px}
  .status{color:var(--mut);padding:20px 0}
  .more{color:var(--mut);font-size:.85rem;padding:10px 0}
  code{background:#efeae0;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
<header>
  <h1>Sanskrit → Russian glossary</h1>
  <div class="sub">How every Sanskrit word is rendered into Russian across the 1.09M-token aligned corpus.
    Three layers · SLP1 keys. Method &amp; typology: <a href="README.md">README</a> ·
    Data: <a href="root_glossary.tsv">root.tsv</a> · <a href="lemma_glossary.tsv">lemma.tsv</a> ·
    <a href="surface_glossary.tsv">surface.tsv</a> · <a href="surface_glossary.jsonl.gz">surface.jsonl.gz</a> ·
    <a href="https://github.com/gasyoun/SanskritLexicography/tree/master/RussianTranslation/glossary/surface">surface JSONL per letter</a></div>
</header>
<div class="bar">
  <button class="tab on" data-layer="root">Roots (2,021)</button>
  <button class="tab" data-layer="lemma">Lemmas (40,370)</button>
  <input id="q" placeholder="Search — SLP1 key (gam, BU, kf) or Russian (пришёл, идти)…" autocomplete="off">
  <label class="mode"><input type="checkbox" id="ru"> search Russian</label>
  <span class="count" id="count"></span>
</div>
<main><div class="status" id="status">Loading roots…</div><div id="out"></div></main>
<script>
// --- SLP1 -> IAST (display only) ---
const S2I = {A:'ā',I:'ī',U:'ū',f:'ṛ',F:'ṝ',x:'ḷ',X:'ḹ',E:'ai',O:'au',M:'ṃ',H:'ḥ',
  K:'kh',G:'gh',N:'ṅ',C:'ch',J:'jh',Y:'ñ',w:'ṭ',W:'ṭh',q:'ḍ',Q:'ḍh',R:'ṇ',
  T:'th',D:'dh',P:'ph',B:'bh',S:'ś',z:'ṣ',"'":'’','~':'m̐'};
function iast(s){let o='';for(const c of s)o+=(S2I[c]!==undefined?S2I[c]:c);return o;}

const cache={};            // layer -> grouped array
let layer='root', data=null;
const out=document.getElementById('out'), status=document.getElementById('status'),
      countEl=document.getElementById('count'), q=document.getElementById('q'),
      ruBox=document.getElementById('ru');

function parseTSV(text){
  // columns: key, ru, n, n_total, n_forms, upos   (grouped by key, preserving row order = rank)
  const rows=text.split('\n'); const map=new Map(); const order=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r)continue;
    const c=r.split('\t'); if(c.length<3)continue;
    const key=c[0];
    let e=map.get(key);
    if(!e){e={key,iast:iast(key),n_total:+c[3]||0,n_forms:+c[4]||0,upos:c[5]||'',tr:[],blob:''};map.set(key,e);order.push(e);}
    e.tr.push({ru:c[1],n:+c[2]||0});
  }
  for(const e of order){e.blob=(e.key+' '+e.iast+' '+e.tr.map(t=>t.ru).join(' ')).toLowerCase();}
  return order;
}
async function load(l){
  if(cache[l]){data=cache[l];return;}
  status.textContent='Loading '+l+'s…'; out.innerHTML='';
  const res=await fetch(l+'_glossary.tsv');
  const txt=await res.text();
  cache[l]=parseTSV(txt); data=cache[l];
}
function render(){
  const term=q.value.trim().toLowerCase();
  const useRu=ruBox.checked;
  let hits=data;
  if(term){
    hits=data.filter(e=> useRu ? e.tr.some(t=>t.ru.toLowerCase().includes(term))
                                : (e.key.toLowerCase().includes(term)||e.iast.toLowerCase().includes(term)));
  }
  countEl.textContent=hits.length.toLocaleString()+' '+layer+'s';
  const CAP=250;
  const frag=document.createDocumentFragment();
  hits.slice(0,CAP).forEach(e=>{
    const card=document.createElement('div');card.className='card';
    const pre=layer==='root'?'√':'';
    let trs=e.tr; if(useRu&&term)trs=e.tr.filter(t=>t.ru.toLowerCase().includes(term)).concat(e.tr.filter(t=>!t.ru.toLowerCase().includes(term)));
    card.innerHTML='<span class="key">'+pre+e.key+'</span><span class="iast">'+pre+e.iast+'</span>'+
      '<span class="meta">n='+e.n_total.toLocaleString()+' · '+e.n_forms+' forms'+(e.upos?' · '+e.upos:'')+'</span>'+
      '<div class="tr">'+trs.slice(0,80).map(t=>'<span class="chip">'+esc(t.ru)+'<b>'+t.n+'</b></span>').join('')+'</div>';
    frag.appendChild(card);
  });
  out.innerHTML=''; status.textContent='';
  out.appendChild(frag);
  if(hits.length>CAP){const m=document.createElement('div');m.className='more';m.textContent='… '+(hits.length-CAP).toLocaleString()+' more — narrow your search';out.appendChild(m);}
  if(hits.length===0){out.innerHTML='<div class="status">No match.</div>';}
}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

let t;q.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(render,120);});
ruBox.addEventListener('change',render);
q.addEventListener('input',()=>{q.setAttribute('placeholder',ruBox.checked?'Russian…':'SLP1 or Russian…')});
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',async()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); layer=b.dataset.layer;
  await load(layer); render();
}));
(async()=>{await load('root'); render();})();
</script>
</body>
</html>
