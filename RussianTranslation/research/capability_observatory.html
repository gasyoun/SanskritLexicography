var DOT = {"not-started": "⚪", "prototype": "🟡", "validated": "🟢", "blocked": "🔴", "shipped": "✅"}, ORDER = {"shipped": 0, "validated": 1, "prototype": 2, "blocked": 3, "not-started": 4};
var reg = window.OBS_DATA, cards = reg.cards, pkgs = reg.packages;
var state = { status:null, dep:null, pkg:null, cheap:false, sortK:"id", sortDir:1 };

function kpi() {
  var by = {}, cheap = 0;
  cards.forEach(function(c){ by[c.status]=(by[c.status]||0)+1; if(c.cheap) cheap++; });
  var el = document.getElementById("kpi");
  var html = '<div><b>' + cards.length + '</b>layers</div>';
  html += '<div><b class="cheap">' + cheap + '</b>cheap-derivable</div>';
  Object.keys(ORDER).sort(function(a,b){return ORDER[a]-ORDER[b];}).forEach(function(s){
    if(by[s]) html += '<div><b>' + (DOT[s]||'') + ' ' + by[s] + '</b>' + s + '</div>';
  });
  el.innerHTML = html;
}
function filters() {
  var el = document.getElementById("filters"), h = '';
  h += '<strong>status</strong> ';
  Object.keys(ORDER).sort(function(a,b){return ORDER[a]-ORDER[b];}).forEach(function(s){
    h += '<button data-t="status" data-v="'+s+'">'+(DOT[s]||'')+' '+s+'</button>';
  });
  h += ' &nbsp;<strong>dep</strong> ';
  var deps = {}; cards.forEach(function(c){c.deps.forEach(function(d){deps[d]=1;});});
  Object.keys(deps).forEach(function(d){ h += '<button data-t="dep" data-v="'+d+'">'+d+'</button>'; });
  h += ' &nbsp;<strong>package</strong> ';
  Object.keys(pkgs).forEach(function(p){ h += '<button data-t="pkg" data-v="'+p+'">'+pkgs[p]+'</button>'; });
  h += ' &nbsp;<button data-t="cheap" data-v="1">cheap only</button>';
  h += ' &nbsp;<button data-t="reset" data-v="">reset</button>';
  el.innerHTML = h;
  el.querySelectorAll("button").forEach(function(b){
    b.onclick = function(){
      var t=b.dataset.t, v=b.dataset.v;
      if(t==="reset"){ state={status:null,dep:null,pkg:null,cheap:false,sortK:state.sortK,sortDir:state.sortDir}; }
      else if(t==="cheap"){ state.cheap=!state.cheap; }
      else { state[t] = (state[t]===v? null : v); }
      draw();
    };
  });
}
function rows() {
  var out = cards.filter(function(c){
    if(state.status && c.status!==state.status) return false;
    if(state.dep && c.deps.indexOf(state.dep)<0) return false;
    if(state.pkg && c.package!==state.pkg) return false;
    if(state.cheap && !c.cheap) return false;
    return true;
  });
  out.sort(function(a,b){
    var k=state.sortK, av=a[k], bv=b[k];
    if(k==="status"){ av=ORDER[a.status]; bv=ORDER[b.status]; }
    if(k==="deps"){ av=a.deps.join(); bv=b.deps.join(); }
    if(av<bv) return -1*state.sortDir; if(av>bv) return 1*state.sortDir; return a.id-b.id;
  });
  return out;
}
function draw() {
  document.querySelectorAll("#filters button").forEach(function(b){
    var t=b.dataset.t, v=b.dataset.v, on=false;
    if(t==="cheap") on=state.cheap; else if(t!=="reset") on=(state[t]===v);
    b.classList.toggle("on", on);
  });
  var tb = document.querySelector("#tbl tbody"); tb.innerHTML="";
  rows().forEach(function(c){
    var tr = document.createElement("tr");
    tr.innerHTML =
      '<td class="num">'+c.id+'</td>'+
      '<td>'+c.title+'</td>'+
      '<td>'+(pkgs[c.package]||c.package)+'</td>'+
      '<td>'+(DOT[c.status]||'')+' '+c.status+'</td>'+
      '<td>'+c.confidence+'</td>'+
      '<td>'+c.deps.map(function(d){return '<span class="pill">'+d+'</span>';}).join(' ')+'</td>'+
      '<td>'+(c.cheap?'<span class="cheap">yes</span>':'')+'</td>'+
      '<td class="note">'+(c.coverage_note||'')+'</td>';
    tb.appendChild(tr);
  });
}
document.querySelectorAll("#tbl th").forEach(function(th){
  th.onclick=function(){ var k=th.dataset.k; if(state.sortK===k) state.sortDir*=-1; else {state.sortK=k; state.sortDir=1;} draw(); };
});
kpi(); filters(); draw();
</script>
