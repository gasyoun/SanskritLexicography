name: CI

# Baseline CI for generic / satellite repos.
# Language-agnostic checks: markdown lint, link check, YAML lint,
# plus opportunistic language-specific lint if package.json/requirements.txt present.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Lint markdown (warnings only)
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#RussianTranslation/glossary/md" || echo "::warning::Markdown lint issues found"

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/mlc_config.json"
        continue-on-error: true

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
      - run: pip install pyyaml
      - name: Validate all YAML
        run: |
          python -c "
          import sys, glob, yaml
          fail = 0
          for f in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              if '.git' in f: continue
              try:
                  with open(f, encoding='utf-8') as fh: yaml.safe_load(fh)
              except yaml.YAMLError as e:
                  print(f'::error file={f}::{e}'); fail = 1
          sys.exit(fail)
          "

  # Conditional Python lint
  python-lint:
    name: Python lint (if any .py present)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          if find . -name "*.py" -not -path "./.git/*" | head -1 | grep -q .; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.has_python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - if: steps.check.outputs.has_python == 'true'
        run: pip install ruff
      - if: steps.check.outputs.has_python == 'true'
        run: ruff check --select=E9,F63,F7,F82 --output-format=github .

  russian-translation-gates:
    name: RussianTranslation gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Compile gate scripts
        run: |
          python -m py_compile \
            RussianTranslation/src/roadmap_check.py \
            RussianTranslation/src/validate_final_card_schema.py \
            RussianTranslation/src/validate_assembled_export.py \
            RussianTranslation/src/run_batch.py \
            RussianTranslation/src/gold_validate.py \
            RussianTranslation/src/gold_ingest.py \
            RussianTranslation/src/gold_status.py \
            RussianTranslation/src/gold_packet.py \
            RussianTranslation/src/gold_packet_verify.py \
            RussianTranslation/src/gold_double_review_queue.py \
            RussianTranslation/src/gold_double_review_verify.py \
            RussianTranslation/src/gold_ingest_double_review.py \
            RussianTranslation/src/gold_agreement.py \
            RussianTranslation/src/export_interop.py \
            RussianTranslation/src/validate_interop.py \
            RussianTranslation/src/make_edition_cut.py \
            RussianTranslation/src/validate_release.py \
            RussianTranslation/src/release_readiness.py \
            RussianTranslation/src/preflight_remaining_gates.py \
            RussianTranslation/src/export_lod.py \
            RussianTranslation/src/lod_acceptance.py
      - name: LOD graph acceptance (fixture-only, H350/E7)
        working-directory: RussianTranslation
        run: |
          pip install rdflib pyshacl
          python src/lod_acceptance.py --cards /nonexistent
      - name: Validate roadmap
        working-directory: RussianTranslation
        run: python src/roadmap_check.py
      - name: Validate final-card schema fixture
        working-directory: RussianTranslation
        run: |
          python src/validate_final_card_schema.py
          python src/validate_final_card_schema.py --selftest
          python src/validate_assembled_export.py --cards src/fixtures/assembled_card.fixture.jsonl --quarantine src/fixtures/assembled_quarantine.fixture.jsonl --min-cards 1
      - name: Check pilot workflow syntax
        working-directory: RussianTranslation
        run: node --check src/pilot/run_pilot_wf.js
      - name: Guard review changelog updates
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=50
            python RussianTranslation/src/review_changelog_guard.py --base FETCH_HEAD --head HEAD
          else
            python RussianTranslation/src/review_changelog_guard.py --base HEAD~1 --head HEAD
          fi
      - name: Validate review gate fixtures
        working-directory: RussianTranslation
        run: |
          cp src/fixtures/review_store.fixture.jsonl "$RUNNER_TEMP/review_store.jsonl"
          PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/run_batch.py validate_review src/fixtures/review_queue.blank.fixture.csv
          if PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/run_batch.py validate_review src/fixtures/review_queue.bad_missing_reviewer.fixture.csv; then
            echo "expected missing-reviewer fixture to fail"
            exit 1
          fi
          if PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/run_batch.py validate_review src/fixtures/review_queue.bad_non_machine_ok.fixture.csv; then
            echo "expected non-machine-ok approval fixture to fail"
            exit 1
          fi
          PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/run_batch.py validate_review src/fixtures/review_queue.apply.fixture.csv
          PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" PWG_RU_REVIEW_REPORT="$RUNNER_TEMP/review_readiness_report.md" python src/run_batch.py review_report src/fixtures/review_queue.apply.fixture.csv
          PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/run_batch.py apply_review src/fixtures/review_queue.apply.fixture.csv
          PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/run_batch.py status
          PWG_RU_STORE="$RUNNER_TEMP/review_store.jsonl" python src/release_readiness.py --release-dir "$RUNNER_TEMP" --out "$RUNNER_TEMP/readiness_after_review.md"
          python - <<'PY'
          import json, os
          rows = [json.loads(line) for line in open(os.path.join(os.environ['RUNNER_TEMP'], 'review_store.jsonl'), encoding='utf-8')]
          by_ord = {r['ord']: r for r in rows}
          assert by_ord[1]['review_status'] == 'human_reviewed'
          assert by_ord[1]['ru'] == 'исправленный огонь'
          assert by_ord[1]['reviewer'] == 'editor-a'
          assert by_ord[2]['review_status'] == 'approved'
          assert by_ord[3]['review_status'] == 'needs_review'
          assert by_ord[4]['review_status'] == 'needs_review'
          print('review apply fixture OK')
          PY
          python src/export_interop.py all --cards src/fixtures/assembled_card.fixture.jsonl --store "$RUNNER_TEMP/review_store.jsonl" --out-dir "$RUNNER_TEMP/review_interop"
          python src/validate_interop.py --dir "$RUNNER_TEMP/review_interop"
          python - <<'PY'
          import json, os
          path = os.path.join(os.environ['RUNNER_TEMP'], 'review_interop', 'reverse_index.jsonl')
          lemmas = {json.loads(line)['ru'] for line in open(path, encoding='utf-8') if line.strip()}
          assert 'исправленный' in lemmas
          assert 'жертвенный' in lemmas
          assert 'запретный' not in lemmas
          assert 'отклоненный' not in lemmas
          print('fail-closed export fixture OK')
          PY
      - name: Validate gold fixture
        working-directory: RussianTranslation
        run: |
          python src/gold_validate.py src/fixtures/human_gold_review.fixture.csv --expect 3
          python src/gold_status.py src/fixtures/human_gold_review.fixture.csv
          python src/gold_packet.py src/fixtures/human_gold_scaffold.fixture.csv --batch-size 2 --out-dir "$RUNNER_TEMP/gold_packets"
          python src/gold_packet_verify.py src/fixtures/human_gold_scaffold.fixture.csv "$RUNNER_TEMP/gold_packets"
          python src/gold_double_review_queue.py src/fixtures/human_gold_scaffold.fixture.csv --sample-size 3 --out "$RUNNER_TEMP/double_review_queue.csv"
          python src/gold_double_review_verify.py "$RUNNER_TEMP/double_review_queue.csv" --sample-size 3
          python src/gold_ingest.py src/fixtures/human_gold_review.fixture.csv "$RUNNER_TEMP/human_gold_labels.fixture.jsonl"
          python src/gold_ingest_double_review.py src/fixtures/double_review_queue.fixture.csv "$RUNNER_TEMP/double_review_labels.fixture.jsonl"
          python src/gold_agreement.py "$RUNNER_TEMP/human_gold_labels.fixture.jsonl" "$RUNNER_TEMP/gold_reports" --fixture
          python src/gold_agreement.py "$RUNNER_TEMP/double_review_labels.fixture.jsonl" "$RUNNER_TEMP/double_review_reports" --fixture
      - name: Validate interop and release fixtures
        working-directory: RussianTranslation
        run: |
          python src/export_interop.py all --cards src/fixtures/assembled_card.fixture.jsonl --out-dir "$RUNNER_TEMP/interop_fixture"
          python src/validate_interop.py --dir "$RUNNER_TEMP/interop_fixture"
          python src/release_readiness.py --release-dir "$RUNNER_TEMP/interop_fixture" --out "$RUNNER_TEMP/readiness_report.md"
          python src/preflight_remaining_gates.py --release-dir "$RUNNER_TEMP/interop_fixture" --readiness-out "$RUNNER_TEMP/preflight_readiness_report.md" --skip-local-human-artifacts
          python src/make_edition_cut.py edition_fixture --cards src/fixtures/assembled_card.fixture.jsonl --release-root "$RUNNER_TEMP/release_fixture" --source-release "$RUNNER_TEMP/release_fixture/source"
          python src/validate_release.py "$RUNNER_TEMP/release_fixture/edition_fixture"

  # Conditional JS lint
  js-lint:
    name: JS lint (if package.json present)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.has_pkg == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - if: steps.check.outputs.has_pkg == 'true'
        run: npm install
      - if: steps.check.outputs.has_pkg == 'true'
        run: npm test --if-present
