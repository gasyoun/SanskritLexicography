# Monthly FINDINGS-dashboard data refresh (registry meta + repo-internal metrics).
# Platform liveness probes deliberately do NOT run here — several target hosts
# block GitHub Actions datacenter IPs (Uprava FINDINGS §1); those run monthly
# from the residential machine via findings_dashboard/monthly_refresh.py.
name: findings-dashboard

on:
  schedule:
    - cron: "17 6 3 * *"   # 3rd of each month, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build data + timeseries snapshot
        run: python findings_dashboard/build_findings_data.py

      - name: Build epistemic-registries dashboard data
        # The seven epistemic sibling registries (H356) — parse the Sanskrit-data side
        # only (the infra side lives in the private Uprava repo and is not published).
        run: |
          python epistemic_dashboard/build_epistemic_dashboard.py \
            --dir . --side sanskrit \
            --repo-url https://github.com/gasyoun/SanskritLexicography/blob/master \
            --out epistemic_dashboard/epistemic.json

      - name: Commit data to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add findings_dashboard/data.json findings_dashboard/timeseries.json epistemic_dashboard/epistemic.json
          git diff --cached --quiet || git commit -m "chore(dashboards): monthly data refresh [skip ci]"
          git push

      - uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: pages

      - name: Publish to gh-pages/findings/, /episteme/ and /progress/
        run: |
          mkdir -p pages/findings pages/episteme pages/progress
          cp findings_dashboard/index.html findings_dashboard/data.json findings_dashboard/timeseries.json pages/findings/
          [ -f findings_dashboard/platform_status.json ] && cp findings_dashboard/platform_status.json pages/findings/ || true
          cp epistemic_dashboard/index.html epistemic_dashboard/epistemic.json pages/episteme/
          # PWG->RU progress dashboard: its data is built LOCALLY (from gitignored
          # pipeline artifacts CI cannot see) and committed to master, so here we
          # only COPY the already-committed HTML+JSON — there is no build step.
          cp progress_dashboard/index.html pages/progress/
          [ -f progress_dashboard/progress_data.json ] && cp progress_dashboard/progress_data.json pages/progress/ || true
          [ -f progress_dashboard/progress_timeseries.json ] && cp progress_dashboard/progress_timeseries.json pages/progress/ || true
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # the dashboard published at /epistemic/ before the 08-07-2026 rename to /episteme/ — drop the stale copy
          git rm -r --quiet --ignore-unmatch epistemic
          git add findings episteme progress
          git diff --cached --quiet || git commit -m "chore(dashboards): publish monthly refresh"
          git push
