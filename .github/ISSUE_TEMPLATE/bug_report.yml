name: Bug report
description: Report a defect or unexpected behaviour.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, version etc.
