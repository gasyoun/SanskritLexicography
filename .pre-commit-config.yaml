repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: russian-translation-review-changelog
        name: RussianTranslation review changelog guard
        entry: python RussianTranslation/src/review_changelog_guard.py --staged
        language: system
        pass_filenames: false
      - id: epistemic-integrity-check
        name: Epistemic registry integrity (§-numbers, Index parity, dashboards)
        entry: python tools/epistemic_integrity_check.py --dir .
        language: system
        pass_filenames: false
        files: '(FINDINGS|CONTRADICTIONS|DEAD_ENDS|GAPS|ASSUMPTIONS|RECIPES|STALENESS|GLOSSARY)\.md$|(findings_dashboard/data|epistemic_dashboard/epistemic)\.json$'
